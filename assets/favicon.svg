<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>
  <!-- Hand silhouette -->
  <g fill="none" stroke="#00ffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Palm -->
    <rect x="18" y="32" width="28" height="18" rx="6" fill="rgba(0,255,255,0.08)" stroke="#00ffff"/>
    <!-- Fingers -->
    <line x1="22" y1="32" x2="22" y2="18"/>
    <line x1="28" y1="32" x2="28" y2="14"/>
    <line x1="34" y1="32" x2="34" y2="14"/>
    <line x1="40" y1="32" x2="40" y2="18"/>
    <!-- Thumb -->
    <line x1="18" y1="38" x2="12" y2="30"/>
  </g>
  <!-- Glow dots at fingertips -->
  <circle cx="22" cy="17" r="3" fill="#00ffff" opacity="0.9"/>
  <circle cx="28" cy="13" r="3" fill="#ff00ff" opacity="0.9"/>
  <circle cx="34" cy="13" r="3" fill="#00ffff" opacity="0.9"/>
  <circle cx="40" cy="17" r="3" fill="#ff00ff" opacity="0.9"/>
  <circle cx="11" cy="29" r="3" fill="#00ffff" opacity="0.9"/>
</svg>
